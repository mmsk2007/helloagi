# Publishes to PyPI when you publish a GitHub Release (creates a tag).
#
# PyPI → helloagi → Publishing → Manage publishers:
#   Owner: mmsk2007
#   Repository name: helloagi
#   Workflow filename: publish-pypi.yml
#   Environment name: leave EMPTY unless you also create a GitHub Environment
#   and set the same name here (must match exactly).
name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
